services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: diary
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  backend:
    build:
      context: ./backend
    environment:
      API_ADDR: ":8080"
      DATABASE_DSN: "root:password@tcp(mysql:3306)/diary?charset=utf8mb4&parseTime=True&loc=Local"
      JWT_SECRET: "dev-secret-change-me"
      TOKEN_TTL_DAYS: "7"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_BUCKET: "diary-attachments"
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE: ""
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  mysql-data:
  minio-data:
